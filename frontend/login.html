<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CareTrack Clinic – Login</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body class="login-body">
    <div class="deco-circle deco-top"></div>
    <div class="deco-circle deco-bottom"></div>

    <div class="login-card">
      <div class="brand-icon">
        <i class="ti ti-heart-rate-monitor"></i>
      </div>
      <h1 class="brand-title">CareTrack Clinic</h1>
      <p class="brand-subtitle">Medical Records Management System</p>

      <p class="role-label">Sign in as</p>
      <div class="role-pills" id="rolePills">
        <button class="role-pill active" data-role="admin" type="button">
          <i class="ti ti-shield-lock"></i>
          Admin
        </button>
        <button class="role-pill" data-role="clinician" type="button">
          <i class="ti ti-stethoscope"></i>
          Clinician
        </button>
        <button class="role-pill" data-role="receptionist" type="button">
          <i class="ti ti-headset"></i>
          Reception
        </button>
      </div>

      <form id="loginForm" novalidate>
        <div class="field-group">
          <label class="field-label" for="username">Username</label>
          <div class="field-wrap">
            <i class="ti ti-user"></i>
            <input
              type="text"
              id="username"
              placeholder="Enter your username"
              required
            />
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="field-wrap">
            <i class="ti ti-lock"></i>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>
        </div>

        <button class="login-btn" type="submit">
          <i class="ti ti-login"></i>
          Sign in
        </button>
      </form>

      <p id="message"></p>

      <div class="secure-note">
        <i class="ti ti-shield-check"></i>
        Secured · HIPAA compliant
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
