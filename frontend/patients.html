      <div class="main">
        <div class="main">
          <h1>Patients</h1>

          <!-- SEARCH + ADD -->
          <div class="top-bar">
            <input
              type="text"
              id="searchInput"
              placeholder="Search by name..."
              oninput="searchPatients()"
            />
            <button id="openAddModal">+ Add Patient</button>
          </div>

          <p id="formMessage"></p>

          <!-- TABLE -->
          <table id="patientsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Contact</th>
                <th>Doctor</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="patientsBody"></tbody>
          </table>

          <!-- MODAL -->
          <div
            id="modal"
            style="
              display: none;
              position: fixed;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              background: rgba(0, 0, 0, 0.5);
              justify-content: center;
              align-items: center;
            "
          >
            <div
              style="
                background: white;
                padding: 30px;
                border-radius: 10px;
                width: 400px;
              "
            >
              <h3 id="modalTitle">Add Patient</h3>
              <input type="hidden" id="editId" />

              <input type="text" id="name" placeholder="Full name" /><br />

              <input type="number" id="age" placeholder="Age" /><br />

              <select id="gender">
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option></select
              ><br />

              <input type="text" id="contact" value="+998" /><br />

              <select id="doctor_id">
                <option value="">Select Doctor</option></select
              ><br />

              <button id="saveBtn">Save</button>
              <button id="closeModal">Cancel</button>
            </div>
          </div>
        </div>
        <br />
        <br />
        <script src="js/patients.js"></script>
